<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Ad Cleaner Pro</title>

<style>
body {
  font-family: "Segoe UI", Arial, sans-serif;
  background: radial-gradient(circle at top, #020617, #020617 40%, #000);
  color: #e5e7eb;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
  zoom: 1.25;
}

.card {
  background: #020617;
  border-radius: 16px;
  width: 380px;
  padding: 28px;
  text-align: center;
  box-shadow: 0 0 25px rgba(34,197,94,.25);
  animation: float 6s ease-in-out infinite;
}

@keyframes float {
  50% { transform: translateY(-6px); }
}

.icon {
  font-size: 50px;
  filter: drop-shadow(0 0 10px rgba(34,197,94,.6));
}

h1 { font-size: 21px; margin: 8px 0; }

.status {
  font-weight: bold;
  margin-bottom: 12px;
  color: #22c55e;
}

.loading {
  display: none;
  color: #38bdf8;
  margin-bottom: 8px;
  animation: blink 1s infinite;
}

@keyframes blink { 50% { opacity: .3; } }

.log {
  background: rgba(2,6,23,.6);
  border: 1px solid #1e293b;
  border-radius: 10px;
  padding: 12px;
  height: 120px;
  overflow-y: auto;
  font-size: 13px;
  text-align: left;
  margin-bottom: 12px;
}

.log div {
  margin-bottom: 6px;
  color: #a7f3d0;
  animation: fadeIn .3s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; }
}

button {
  background: linear-gradient(135deg, #22c55e, #4ade80);
  color: #022c22;
  border: none;
  padding: 13px;
  width: 100%;
  border-radius: 10px;
  font-size: 15px;
  font-weight: bold;
  cursor: pointer;
  margin-top: 8px;
  box-shadow: 0 8px 20px rgba(34,197,94,.35);
  transition: .25s;
}

button:hover { transform: translateY(-2px); }
button:disabled { opacity: .5; cursor: not-allowed; }

.cleaning {
  display: none;
  margin-top: 14px;
}

.broom {
  font-size: 44px;
  animation: sweep .7s infinite alternate ease-in-out;
}

@keyframes sweep {
  from { transform: translateX(-50px) rotate(-25deg); }
  to { transform: translateX(50px) rotate(25deg); }
}

.percent {
  font-size: 22px;
  font-weight: bold;
  color: #22c55e;
  margin-top: 6px;
}

.final {
  display: none;
  animation: fadeUp .6s ease forwards;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; }
}

.check {
  font-size: 72px;
  color: #22c55e;
  filter: drop-shadow(0 0 15px rgba(34,197,94,.8));
  animation: pop .6s ease;
}

@keyframes pop {
  from { transform: scale(.5); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.footer {
  margin-top: 12px;
  font-size: 11px;
  color: #64748b;
}
</style>
</head>

<body>

<div class="card">

<div id="mainUI">
  <div class="icon">🛡️</div>
  <h1>Ad Cleaner Pro</h1>
  <div class="status" id="status">✔ Proteksi Aktif</div>

  <div class="loading" id="loading">🔍 Memindai sistem...</div>

  <div class="log" id="log">
    <div>• Sistem siap digunakan</div>
  </div>

  <button id="scanBtn">Pindai & Bersihkan</button>
  <button id="cleanBtn" style="display:none;">🧹 Bersihkan Iklan</button>

  <div class="cleaning" id="cleaning">
    <div class="broom">🧹</div>
    <div id="cleanText" style="margin-top:6px;color:#38bdf8;">
      Membersihkan iklan...
    </div>
    <div class="percent" id="percent">0%</div>
  </div>

  <div class="footer">Versi 1.0 • Perlindungan Real-Time</div>
</div>

<div class="final" id="finalUI">
  <div class="check">✅</div>
  <h2>Sistem Bersih</h2>
  <p style="color:#94a3b8;font-size:14px;">
    Semua iklan & tracker berhasil dibersihkan
  </p>
  <button onclick="location.reload()">DONE</button>
</div>

</div>

<script>
const logs = [
  "Iklan pop-up terdeteksi",
  "Tracker pihak ketiga ditemukan",
  "Script iklan dianalisis",
  "Banner iklan terhapus",
  "Cookie iklan dibersihkan",
  "Redirect iklan dicegah"
];

const cleanSteps = [
  "Menghapus iklan pop-up...",
  "Membersihkan script iklan...",
  "Menghapus tracker...",
  "Mengoptimalkan sistem...",
  "Finalisasi pembersihan..."
];

const logBox = document.getElementById("log");
const scanBtn = document.getElementById("scanBtn");
const cleanBtn = document.getElementById("cleanBtn");
const loading = document.getElementById("loading");
const status = document.getElementById("status");
const cleaning = document.getElementById("cleaning");
const cleanText = document.getElementById("cleanText");
const percentText = document.getElementById("percent");
const mainUI = document.getElementById("mainUI");
const finalUI = document.getElementById("finalUI");

scanBtn.onclick = () => {
  scanBtn.disabled = true;
  logBox.innerHTML = "";
  loading.style.display = "block";
  status.textContent = "⏳ Memindai...";
  status.style.color = "#38bdf8";

  let i = 0;
  const scan = setInterval(() => {
    logBox.innerHTML += `<div>✔ ${logs[i]}</div>`;
    logBox.scrollTop = logBox.scrollHeight;
    i++;
    if (i >= logs.length) {
      clearInterval(scan);
      loading.style.display = "none";
      status.textContent = "✔ Siap dibersihkan";
      status.style.color = "#22c55e";
      cleanBtn.style.display = "block";
      scanBtn.disabled = false;
    }
  }, 600);
};

cleanBtn.onclick = () => {
  cleanBtn.disabled = true;
  cleaning.style.display = "block";
  status.textContent = "🧹 Membersihkan iklan...";
  percentText.textContent = "0%";

  let step = 0;
  let percent = 0;

  const percentInterval = setInterval(() => {
    percent += 2;
    percentText.textContent = percent + "%";
    if (percent >= 100) clearInterval(percentInterval);
  }, 90); // naik halus ±4.5 detik

  const cleanInterval = setInterval(() => {
    cleanText.textContent = cleanSteps[step];
    step++;
    if (step >= cleanSteps.length) {
      clearInterval(cleanInterval);
      setTimeout(() => {
        mainUI.style.display = "none";
        finalUI.style.display = "block";
      }, 500);
    }
  }, 900);
};
</script>

</body>
</html>
