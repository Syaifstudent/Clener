<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ad Cleaner Pro</title>

<style>
*{box-sizing:border-box}
body{
  font-family:"Segoe UI",Arial,sans-serif;
  background:radial-gradient(circle at top,#020617,#020617 40%,#000);
  color:#e5e7eb;
  margin:0;
  min-height:100vh;
}
.app{
  width:100%;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}
.card{
  width:min(92vw,420px);
  background:#020617;
  border-radius:18px;
  padding:30px;
  text-align:center;
  box-shadow:0 0 30px rgba(34,197,94,.35), inset 0 0 20px rgba(255,255,255,.03);
}
.icon{
  font-size:52px;
  filter:drop-shadow(0 0 12px rgba(34,197,94,.7));
}
h1{font-size:22px;margin:10px 0 6px}
.status{font-weight:bold;color:#22c55e;margin-bottom:14px}

/* ===== SCAN ===== */
.scanBox{
  display:none;
  position:relative;
  width:140px;
  height:220px;
  margin:18px auto;
}
.phone{
  width:100%;
  height:100%;
  border-radius:18px;
  border:2px solid #22c55e;
  box-shadow:0 0 20px rgba(34,197,94,.6);
}
.magnifier{
  position:absolute;
  font-size:42px;
  animation:scanMove 2.5s linear infinite;
}
@keyframes scanMove{
  0%{top:10px;left:10px}
  25%{top:30px;left:70px}
  50%{top:120px;left:40px}
  75%{top:160px;left:80px}
  100%{top:10px;left:10px}
}

/* ===== LOG ===== */
.log{
  background:rgba(2,6,23,.6);
  border:1px solid #1e293b;
  border-radius:12px;
  padding:14px;
  height:140px;
  overflow-y:auto;
  font-size:14px;
  text-align:left;
  margin-bottom:14px;
}
.log div{
  margin-bottom:8px;
  color:#a7f3d0;
  animation:fade .3s ease;
}
@keyframes fade{
  from{opacity:0;transform:translateY(4px)}
  to{opacity:1}
}

/* ===== BUTTON ===== */
button{
  width:100%;
  padding:15px;
  border-radius:12px;
  border:none;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
  background:linear-gradient(135deg,#22c55e,#4ade80);
  color:#022c22;
  box-shadow:0 10px 25px rgba(34,197,94,.4);
  margin-top:10px;
}
button:disabled{opacity:.5}

/* ===== CLEAN ===== */
.cleaning{display:none;margin-top:16px}
.broom{
  font-size:46px;
  animation:sweep .7s infinite alternate;
}
@keyframes sweep{
  from{transform:translateX(-50px) rotate(-25deg)}
  to{transform:translateX(50px) rotate(25deg)}
}
.percent{
  margin-top:8px;
  font-size:24px;
  font-weight:bold;
  color:#22c55e;
}

/* ===== FINAL ===== */
.final{display:none;text-align:center}
.check{
  font-size:80px;
  color:#22c55e;
  filter:drop-shadow(0 0 18px rgba(34,197,94,.9));
}
.footer{margin-top:14px;font-size:12px;color:#64748b}
</style>
</head>

<body>
<div class="app">
<div class="card">

<div id="mainUI">
  <div class="icon">🛡️</div>
  <h1>Ad Cleaner Pro</h1>
  <div class="status" id="status">✔ Siap dipindai</div>

  <div class="scanBox" id="scanBox">
    <div class="phone"></div>
    <div class="magnifier">🔍</div>
  </div>

  <div class="log" id="log"></div>

  <button id="scanBtn">Pindai & Bersihkan</button>
  <button id="cleanBtn" style="display:none">🧹 Bersihkan Iklan</button>

  <div class="cleaning" id="cleaning">
    <div class="broom">🧹</div>
    <div id="cleanText" style="color:#38bdf8">Membersihkan iklan...</div>
    <div class="percent" id="percent">0%</div>
  </div>

  <div class="footer">Versi 1.0 • Perlindungan Real-Time</div>
</div>

<div class="final" id="finalUI">
  <div class="check">✅</div>
  <h2>Sistem Bersih</h2>
  <p style="color:#94a3b8">Semua iklan & tracker berhasil dibersihkan</p>
  <button onclick="location.reload()">DONE</button>
</div>

</div>
</div>

<script>
const scanLogs=[
  "✔ Memindai sistem...",
  "✔ Tracker pihak ketiga ditemukan",
  "✔ Script iklan dianalisis",
  "✔ Banner iklan terdeteksi",
  "✔ Cookie iklan teridentifikasi",
  "✔ Redirect berbahaya dicegah"
];

const scanBtn=document.getElementById("scanBtn");
const cleanBtn=document.getElementById("cleanBtn");
const scanBox=document.getElementById("scanBox");
const log=document.getElementById("log");
const status=document.getElementById("status");
const cleaning=document.getElementById("cleaning");
const percentText=document.getElementById("percent");
const mainUI=document.getElementById("mainUI");
const finalUI=document.getElementById("finalUI");

scanBtn.onclick=()=>{
  scanBtn.disabled=true;
  status.textContent="🔍 Memindai perangkat...";
  scanBox.style.display="block";
  log.innerHTML="";

  let i=0;
  const logInt=setInterval(()=>{
    const div=document.createElement("div");
    div.textContent=scanLogs[i];
    log.appendChild(div);
    log.scrollTop=log.scrollHeight;
    i++;
    if(i>=scanLogs.length){
      clearInterval(logInt);
      setTimeout(()=>{
        scanBox.style.display="none";
        status.textContent="✔ Siap dibersihkan";
        cleanBtn.style.display="block";
      },600);
    }
  },450);
};

cleanBtn.onclick=()=>{
  cleanBtn.disabled=true;
  cleaning.style.display="block";
  let p=0;
  const int=setInterval(()=>{
    p++;
    percentText.textContent=p+"%";
    if(p>=100){
      clearInterval(int);
      setTimeout(()=>{
        mainUI.style.display="none";
        finalUI.style.display="block";
      },400);
    }
  },45);
};
</script>

</body>
</html>
