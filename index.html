<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phone Cleaner</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:"Segoe UI",Arial,sans-serif;
  background:linear-gradient(180deg,#020617,#000);
  color:#e5e7eb;
}
.app{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}
.card{
  width:min(94vw,420px);
  background:#020617;
  border-radius:22px;
  padding:26px;
  text-align:center;
  box-shadow:0 0 40px rgba(34,197,94,.35);
}

/* PHONE */
.phone{
  width:180px;
  height:310px;
  margin:16px auto;
  border-radius:26px;
  border:3px solid #22c55e;
  box-shadow:0 0 25px rgba(34,197,94,.6);
}
.screen{
  height:100%;
  padding:12px;
  overflow-y:auto;
  font-size:12px;
  text-align:left;
}
.screen::-webkit-scrollbar{width:5px}
.screen::-webkit-scrollbar-thumb{
  background:#22c55e;border-radius:10px
}
.log div{
  margin-bottom:6px;
  color:#a7f3d0;
  animation:fade .3s ease;
}
@keyframes fade{
  from{opacity:0;transform:translateY(4px)}
  to{opacity:1}
}
.removed{
  animation:remove .6s forwards;
}
@keyframes remove{
  to{opacity:0;transform:translateX(40px)}
}

/* BUTTON */
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  font-size:16px;
  font-weight:bold;
  background:linear-gradient(135deg,#22c55e,#4ade80);
  color:#022c22;
  cursor:pointer;
}

/* FINAL FULL SCREEN */
.finalScreen{
  position:fixed;
  inset:0;
  background:linear-gradient(180deg,#020617,#000);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:999;
}
.check{
  font-size:110px;
  color:#22c55e;
  filter:drop-shadow(0 0 24px rgba(34,197,94,.9));
  animation:pop .6s ease;
}
@keyframes pop{
  from{opacity:0;transform:scale(.6)}
  to{opacity:1}
}
.doneBtn{
  margin-top:24px;
  width:200px;
}
</style>
</head>

<body>

<div class="app">
<div class="card" id="mainUI">

<h2>Phone Cleaner</h2>

<div class="phone">
  <div class="screen log" id="log"></div>
</div>

<button id="scanBtn">SCAN</button>
<button id="cleanBtn" style="display:none">CLEANER</button>

</div>
</div>

<!-- FINAL SCREEN (SATU LAYAR) -->
<div class="finalScreen" id="finalScreen">
  <div class="check">✅</div>
  <button class="doneBtn" onclick="location.reload()">DONE</button>
</div>

<script>
const scanResults=[
 "AdService.apk terdeteksi",
 "Tracker iklan aktif",
 "Cache iklan 124MB",
 "Popup script tersembunyi",
 "Banner ads background",
 "SDK iklan tidak dikenal",
 "History redirect iklan",
 "Service ads berjalan",
 "Click fraud module",
 "Hidden webview ads",
 "Push ads listener",
 "Adware system service",
 "Temporary ads cache",
 "Background ads task",
 "Injected ads script",
 "Ads database entry",
 "Analytics tracker",
 "Third-party ads API",
 "Ads config file",
 "Suspicious ads activity",
 "Auto popup detected",
 "Overlay ads permission",
 "Floating ads service",
 "Ads beacon found",
 "Unknown ads payload"
];

const log=document.getElementById("log");
const scanBtn=document.getElementById("scanBtn");
const cleanBtn=document.getElementById("cleanBtn");
const mainUI=document.getElementById("mainUI");
const finalScreen=document.getElementById("finalScreen");

let items=[];

/* SCAN */
scanBtn.onclick=()=>{
  scanBtn.disabled=true;
  log.innerHTML="";
  let i=0;
  const s=setInterval(()=>{
    const d=document.createElement("div");
    d.textContent="🔍 "+scanResults[i];
    log.appendChild(d);
    log.scrollTop=log.scrollHeight;
    items.push(d);
    i++;
    if(i>=scanResults.length){
      clearInterval(s);
      scanBtn.style.display="none";
      cleanBtn.style.display="block";
    }
  },350);
};

/* CLEAN */
cleanBtn.onclick=()=>{
  cleanBtn.disabled=true;
  let idx=0;
  const c=setInterval(()=>{
    if(idx<items.length){
      items[idx].textContent="✔ Dihapus: "+scanResults[idx];
      items[idx].classList.add("removed");
      idx++;
    }else{
      clearInterval(c);
      mainUI.style.display="none";
      finalScreen.style.display="flex";
    }
  },180);
};
</script>

</body>
</html>
